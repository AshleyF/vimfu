<script>
(function(){
  try {
    var t = localStorage.getItem('vimfu-theme');
    if (t === 'light' || t === 'dark') {
      document.documentElement.setAttribute('data-theme', t);
    }
  } catch(e) {}
})();
</script>
</head><body>
<button id="theme-toggle" type="button" aria-label="Toggle light/dark theme" title="Toggle theme">🌓</button>
<script>
(function(){
  var btn = document.getElementById('theme-toggle');
  if (!btn) return;
  function current(){
    var t = document.documentElement.getAttribute('data-theme');
    if (t) return t;
    return matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  function paint(){
    btn.textContent = current() === 'dark' ? '☀' : '☾';
  }
  paint();
  btn.addEventListener('click', function(){
    var next = current() === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('vimfu-theme', next); } catch(e) {}
    paint();
  });
  // React to OS preference flips while no explicit choice is set.
  matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(){
    if (!localStorage.getItem('vimfu-theme')) paint();
  });
})();
</script>

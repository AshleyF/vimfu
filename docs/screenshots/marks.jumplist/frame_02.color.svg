<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 400 180"
     font-family="'Cascadia Code','Consolas','Courier New',monospace"
     font-size="16" xml:space="preserve"
     data-vimfu-theme="color">
  <defs><style>
      .bg0 { fill: #000000; }
      .fg0 { fill: #d4d4d4; }
      .cursor { fill: #ff8700; opacity: 0.55; }
      .cursor-text { fill: #000; font-weight: bold; }
  </style></defs>
  <g class="backgrounds">
    <rect class="bg0" width="400" height="180"/>
  </g>
  <g class="foreground">
    <text y="14"><tspan class="fg0" x="0 10 20 30 40 50" xml:space="preserve">line A</tspan></text>
    <text y="32"><tspan class="fg0" x="0 10 20 30 40 50" xml:space="preserve">line B</tspan></text>
    <text y="50"><tspan class="fg0" x="0 10 20 30 40 50" xml:space="preserve">line C</tspan></text>
  </g>
  <g class="cursors">
    <rect class="cursor" x="0" y="36" width="10" height="18"/>
    <text class="cursor-text" x="0" y="50">l</text>
  </g>
</svg>
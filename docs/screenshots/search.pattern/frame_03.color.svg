<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 400 200"
     font-family="'Cascadia Code','Consolas','Courier New',monospace"
     font-size="16" xml:space="preserve"
     data-vimfu-theme="color">
  <defs><style>
      .bg0 { fill: #000000; }
      .bg1 { fill: #666666; }
      .fg0 { fill: #d4d4d4; }
      .cursor { fill: #ff8700; opacity: 0.55; }
      .cursor-text { fill: #000; font-weight: bold; }
  </style></defs>
  <g class="backgrounds">
    <rect class="bg0" width="400" height="200"/>
    <rect class="bg1" x="40" y="0" width="30" height="20"/>
    <rect class="bg1" x="40" y="40" width="30" height="20"/>
  </g>
  <g class="foreground">
    <text y="15"><tspan class="fg0" x="0 10 20 30">the </tspan><tspan class="fg0" x="40 50 60">cat</tspan></text>
    <text y="35"><tspan class="fg0" x="0 10 20 30 40 50 60 70">ran past</tspan></text>
    <text y="55"><tspan class="fg0" x="0 10 20 30">the </tspan><tspan class="fg0" x="40 50 60">cat</tspan></text>
    <text y="75"><tspan class="fg0" x="0 10 20 30 40 50 60 70">and away</tspan></text>
  </g>
  <g class="cursors">
    <rect class="cursor" x="40" y="0" width="10" height="20"/>
    <text class="cursor-text" x="40" y="15">c</text>
  </g>
</svg>
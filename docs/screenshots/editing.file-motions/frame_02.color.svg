<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 400 200"
     font-family="'Cascadia Code','Consolas','Courier New',monospace"
     font-size="16" xml:space="preserve"
     data-vimfu-theme="color">
  <defs><style>
      .bg0 { fill: #000000; }
      .fg0 { fill: #d4d4d4; }
      .cursor { fill: #ff8700; opacity: 0.55; }
      .cursor-text { fill: #000; font-weight: bold; }
  </style></defs>
  <g class="backgrounds">
    <rect class="bg0" width="400" height="200"/>
  </g>
  <g class="foreground">
    <text y="15"><tspan class="fg0" x="0 10 20 30 40 50" xml:space="preserve">line 1</tspan></text>
    <text y="35"><tspan class="fg0" x="0 10 20 30 40 50" xml:space="preserve">line 2</tspan></text>
    <text y="55"><tspan class="fg0" x="0 10 20 30 40 50" xml:space="preserve">line 3</tspan></text>
    <text y="75"><tspan class="fg0" x="0 10 20 30 40 50" xml:space="preserve">line 4</tspan></text>
    <text y="95"><tspan class="fg0" x="0 10 20 30 40 50" xml:space="preserve">line 5</tspan></text>
  </g>
  <g class="cursors">
    <rect class="cursor" x="0" y="0" width="10" height="20"/>
    <text class="cursor-text" x="0" y="15">l</text>
  </g>
</svg>
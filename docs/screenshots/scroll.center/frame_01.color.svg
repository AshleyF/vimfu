<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 400 180"
     font-family="'Cascadia Code','Consolas','Courier New',monospace"
     font-size="16" xml:space="preserve"
     data-vimfu-theme="color">
  <defs><style>
      .bg0 { fill: #000000; }
      .fg0 { fill: #d4d4d4; }
      .cursor { fill: #ff8700; opacity: 0.55; }
      .cursor-text { fill: #000; font-weight: bold; }
  </style></defs>
  <g class="backgrounds">
    <rect class="bg0" width="400" height="180"/>
  </g>
  <g class="foreground">
    <text y="14"><tspan class="fg0" x="0" xml:space="preserve">1</tspan></text>
    <text y="32"><tspan class="fg0" x="0" xml:space="preserve">2</tspan></text>
    <text y="50"><tspan class="fg0" x="0" xml:space="preserve">3</tspan></text>
    <text y="68"><tspan class="fg0" x="0" xml:space="preserve">4</tspan></text>
    <text y="86"><tspan class="fg0" x="0" xml:space="preserve">5</tspan></text>
    <text y="104"><tspan class="fg0" x="0" xml:space="preserve">6</tspan></text>
    <text y="122"><tspan class="fg0" x="0" xml:space="preserve">7</tspan></text>
    <text y="140"><tspan class="fg0" x="0" xml:space="preserve">8</tspan></text>
    <text y="158"><tspan class="fg0" x="0" xml:space="preserve">9</tspan></text>
    <text y="176"><tspan class="fg0" x="0 10" xml:space="preserve">10</tspan></text>
  </g>
  <g class="cursors">
    <rect class="cursor" x="0" y="144" width="10" height="18"/>
    <text class="cursor-text" x="0" y="158">9</text>
  </g>
</svg>
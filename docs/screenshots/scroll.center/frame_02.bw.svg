<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 400 200"
     font-family="'Cascadia Code','Consolas','Courier New',monospace"
     font-size="16" xml:space="preserve"
     data-vimfu-theme="bw">
  <defs><style>
      .bg0 { fill: #ffffff; }
      .fg0 { fill: #000000; }
      .cursor { fill: #000000; opacity: 0.85; }
      .cursor-text { fill: #ffffff; font-weight: bold; }
  </style></defs>
  <g class="backgrounds">
    <rect class="bg0" width="400" height="200"/>
  </g>
  <g class="foreground">
    <text y="15"><tspan class="fg0" x="0">4</tspan></text>
    <text y="35"><tspan class="fg0" x="0">5</tspan></text>
    <text y="55"><tspan class="fg0" x="0">6</tspan></text>
    <text y="75"><tspan class="fg0" x="0">7</tspan></text>
    <text y="95"><tspan class="fg0" x="0">8</tspan></text>
    <text y="115"><tspan class="fg0" x="0">9</tspan></text>
    <text y="135"><tspan class="fg0" x="0 10">10</tspan></text>
  </g>
  <g class="cursors">
    <rect class="cursor" x="0" y="80" width="10" height="20"/>
    <text class="cursor-text" x="0" y="95">8</text>
  </g>
</svg>
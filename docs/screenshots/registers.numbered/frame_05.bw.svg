<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 400 200"
     font-family="'Cascadia Code','Consolas','Courier New',monospace"
     font-size="16" xml:space="preserve"
     data-vimfu-theme="bw">
  <defs><style>
      .bg0 { fill: #ffffff; }
      .fg0 { fill: #000000; }
      .cursor { fill: #000000; opacity: 0.85; }
      .cursor-text { fill: #ffffff; font-weight: bold; }
  </style></defs>
  <g class="backgrounds">
    <rect class="bg0" width="400" height="200"/>
  </g>
  <g class="foreground">
    <text y="15"><tspan class="fg0" x="0" xml:space="preserve">C</tspan></text>
    <text y="35"><tspan class="fg0" x="0" xml:space="preserve">B</tspan></text>
    <text y="55"><tspan class="fg0" x="0" xml:space="preserve">A</tspan></text>
  </g>
  <g class="cursors">
    <rect class="cursor" x="0" y="40" width="10" height="20"/>
    <text class="cursor-text" x="0" y="55">A</text>
  </g>
</svg>
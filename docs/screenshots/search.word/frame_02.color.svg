<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 400 200"
     font-family="'Cascadia Code','Consolas','Courier New',monospace"
     font-size="16" xml:space="preserve"
     data-vimfu-theme="color">
  <defs><style>
      .bg0 { fill: #000000; }
      .bg1 { fill: #666666; }
      .fg0 { fill: #d4d4d4; }
      .cursor { fill: #ff8700; opacity: 0.55; }
      .cursor-text { fill: #000; font-weight: bold; }
  </style></defs>
  <g class="backgrounds">
    <rect class="bg0" width="400" height="200"/>
    <rect class="bg1" x="0" y="0" width="30" height="20"/>
    <rect class="bg1" x="80" y="0" width="30" height="20"/>
    <rect class="bg1" x="0" y="20" width="30" height="20"/>
  </g>
  <g class="foreground">
    <text y="15"><tspan class="fg0" x="0 10 20" xml:space="preserve">foo</tspan><tspan class="fg0" x="30 40 50 60 70" xml:space="preserve"> bar </tspan><tspan class="fg0" x="80 90 100" xml:space="preserve">foo</tspan><tspan class="fg0" x="110 120 130 140" xml:space="preserve"> baz</tspan></text>
    <text y="35"><tspan class="fg0" x="0 10 20" xml:space="preserve">foo</tspan><tspan class="fg0" x="30 40 50 60" xml:space="preserve"> qux</tspan></text>
    <text y="55"><tspan class="fg0" x="0 10 20 30 40 50 60 70" xml:space="preserve">/\&lt;foo\&gt;</tspan></text>
  </g>
  <g class="cursors">
    <rect class="cursor" x="0" y="20" width="10" height="20"/>
    <text class="cursor-text" x="0" y="35">f</text>
  </g>
</svg>
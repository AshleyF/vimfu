<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 400 180"
     font-family="'Cascadia Code','Consolas','Courier New',monospace"
     font-size="16" xml:space="preserve"
     data-vimfu-theme="bw">
  <defs><style>
      .bg0 { fill: #ffffff; }
      .bg1 { fill: #cccccc; }
      .fg0 { fill: #000000; }
      .cursor { fill: #000000; opacity: 0.85; }
      .cursor-text { fill: #ffffff; font-weight: bold; }
  </style></defs>
  <g class="backgrounds">
    <rect class="bg0" width="400" height="180"/>
    <rect class="bg1" x="0" y="0" width="30" height="18"/>
    <rect class="bg1" x="80" y="0" width="30" height="18"/>
    <rect class="bg1" x="0" y="18" width="30" height="18"/>
  </g>
  <g class="foreground">
    <text y="14"><tspan class="fg0" x="0 10 20" xml:space="preserve">foo</tspan><tspan class="fg0" x="30 40 50 60 70" xml:space="preserve"> bar </tspan><tspan class="fg0" x="80 90 100" xml:space="preserve">foo</tspan><tspan class="fg0" x="110 120 130 140" xml:space="preserve"> baz</tspan></text>
    <text y="32"><tspan class="fg0" x="0 10 20" xml:space="preserve">foo</tspan><tspan class="fg0" x="30 40 50 60" xml:space="preserve"> qux</tspan></text>
    <text y="50"><tspan class="fg0" x="0 10 20 30 40 50 60 70" xml:space="preserve">/\&lt;foo\&gt;</tspan></text>
  </g>
  <g class="cursors">
    <rect class="cursor" x="0" y="18" width="10" height="18"/>
    <text class="cursor-text" x="0" y="32">f</text>
  </g>
</svg>
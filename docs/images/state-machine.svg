<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <marker id="arrDash" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>

  <style>
    .node       { fill: #fff; stroke: #222; stroke-width: 2; }
    .normal     { fill: #f3f3f3; stroke: #000; stroke-width: 3; }
    .mode       { font-style: italic; font-size: 22px; fill: #000; text-anchor: middle; }
    .mode-big   { font-style: italic; font-size: 28px; fill: #000; text-anchor: middle; }
    .sub        { font-size: 12px; fill: #555; text-anchor: middle; font-style: italic; }
    .edge       { fill: none; stroke: #222; stroke-width: 1.5; }
    .edgeDash   { fill: none; stroke: #666; stroke-width: 1.2; stroke-dasharray: 5 4; }
    .keys       { font-family: monospace; font-size: 14px; fill: #000; text-anchor: middle; }
    .esc        { font-family: monospace; font-size: 13px; fill: #555; text-anchor: middle; }
    .note       { font-family: monospace; font-size: 12px; fill: #555; text-anchor: middle; font-style: italic; }
  </style>

  <!-- ================== Nodes ================== -->

  <!-- Normal (center) -->
  <rect class="normal" x="400" y="320" width="200" height="80" rx="14"/>
  <text class="mode-big" x="500" y="355">normal</text>
  <text class="sub"      x="500" y="378">resting state</text>

  <!-- Insert (right) -->
  <rect class="node" x="800" y="330" width="170" height="60" rx="12"/>
  <text class="mode" x="885" y="360">insert</text>
  <text class="sub"  x="885" y="378">typing text</text>

  <!-- Visual (left) -->
  <rect class="node" x="30" y="330" width="170" height="60" rx="12"/>
  <text class="mode" x="115" y="360">visual</text>
  <text class="sub"  x="115" y="378">char / line / block</text>

  <!-- Command-line (top-right) -->
  <rect class="node" x="700" y="80" width="220" height="60" rx="12"/>
  <text class="mode" x="810" y="110">command-line</text>
  <text class="sub"  x="810" y="128">: / ? line</text>

  <!-- Operator-pending (top-left) -->
  <rect class="node" x="80" y="80" width="240" height="60" rx="12"/>
  <text class="mode" x="200" y="110">operator-pending</text>
  <text class="sub"  x="200" y="128">awaiting a motion</text>

  <!-- Replace (bottom-left) -->
  <rect class="node" x="80" y="600" width="200" height="60" rx="12"/>
  <text class="mode" x="180" y="630">replace</text>
  <text class="sub"  x="180" y="648">overtype</text>

  <!-- Terminal (bottom-right) -->
  <rect class="node" x="700" y="600" width="220" height="60" rx="12"/>
  <text class="mode" x="810" y="630">terminal</text>
  <text class="sub"  x="810" y="648">shell inside vim</text>

  <!-- ================== Edges ================== -->

  <!-- Normal <-> Insert -->
  <line class="edge" x1="600" y1="355" x2="800" y2="355" marker-end="url(#arr)"/>
  <text class="keys" x="700" y="345">i  a  o  I  A  O  s  S  c</text>
  <line class="edge" x1="800" y1="372" x2="600" y2="372" marker-end="url(#arr)"/>
  <text class="esc"  x="700" y="388">Esc</text>

  <!-- Normal <-> Visual -->
  <line class="edge" x1="400" y1="355" x2="200" y2="355" marker-end="url(#arr)"/>
  <text class="keys" x="300" y="345">v   V   ^V</text>
  <line class="edge" x1="200" y1="372" x2="400" y2="372" marker-end="url(#arr)"/>
  <text class="esc"  x="300" y="388">Esc</text>

  <!-- Normal <-> Operator-pending (upper-left diagonal) -->
  <line class="edge" x1="430" y1="320" x2="220" y2="140" marker-end="url(#arr)"/>
  <text class="keys" x="295" y="215" transform="rotate(-40 295 215)">d  c  y  &gt;  &lt;  =</text>
  <line class="edge" x1="260" y1="140" x2="465" y2="320" marker-end="url(#arr)"/>
  <text class="esc"  x="385" y="215" transform="rotate(-40 385 215)">motion / Esc</text>

  <!-- Normal <-> Command-line (upper-right diagonal) -->
  <line class="edge" x1="570" y1="320" x2="780" y2="140" marker-end="url(#arr)"/>
  <text class="keys" x="700" y="215" transform="rotate(40 700 215)">:   /   ?</text>
  <line class="edge" x1="740" y1="140" x2="535" y2="320" marker-end="url(#arr)"/>
  <text class="esc"  x="615" y="215" transform="rotate(40 615 215)">Enter / Esc</text>

  <!-- Normal <-> Replace (lower-left diagonal) -->
  <line class="edge" x1="430" y1="400" x2="220" y2="600" marker-end="url(#arr)"/>
  <text class="keys" x="295" y="510" transform="rotate(43 295 510)">R</text>
  <line class="edge" x1="260" y1="600" x2="465" y2="400" marker-end="url(#arr)"/>
  <text class="esc"  x="385" y="510" transform="rotate(43 385 510)">Esc</text>

  <!-- Normal <-> Terminal (lower-right diagonal) -->
  <line class="edge" x1="570" y1="400" x2="780" y2="600" marker-end="url(#arr)"/>
  <text class="keys" x="700" y="510" transform="rotate(-43 700 510)">:term</text>
  <line class="edge" x1="740" y1="600" x2="535" y2="400" marker-end="url(#arr)"/>
  <text class="esc"  x="615" y="510" transform="rotate(-43 615 510)">^\ ^N</text>

  <!-- Ctrl-O insert -> normal -> back loop -->
  <path class="edgeDash"
        d="M 885 330 C 920 250, 700 230, 600 320"
        marker-end="url(#arrDash)"/>
  <text class="note" x="755" y="245">Ctrl-O  (one command, then back to insert)</text>

</svg>
